apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          # IMPORTANT: Replace <AWS_ACCOUNT_ID> with your 12-digit AWS account number.
          # Example: 123456789012.dkr.ecr.ap-south-1.amazonaws.com/promesa-backend:latest
          image: 175200622339.dkr.ecr.ap-south-1.amazonaws.com/backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "5000"
            - name: MONGO_URI
              # NOTE: If you enable MongoDB authentication (recommended for production),
              # update this URI to: mongodb://username:password@mongo:27017/promesa_midtown
              # and store credentials in promesa-secrets.
              value: mongodb://mongo:27017/promesa_midtown
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: promesa-secrets
                  key: JWT_SECRET
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
