apiVersion: v1
kind: Secret
metadata:
  name: promesa-secrets
type: Opaque
stringData:
  # IMPORTANT: Replace the value below with a strong, random secret before deploying!
  # Generate one with: openssl rand -base64 32
  # ⚠️  Never commit your real secret to version control.
  # For production, consider using AWS Secrets Manager with the External Secrets Operator.
  JWT_SECRET: "CHANGE_ME_TO_A_STRONG_SECRET"
